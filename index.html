<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Spots is a social media app where users share and like photos."
    />
    <meta name="author" content="Daniel Quintana" />
    <meta name="keywords" content="photos, social media, sharing" />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" href="./favicon.ico" />
    <title>Spots</title>
  </head>
  <body>
    <!-- Entire Page -->
    <div class="page">
      <!-- HEADER -->
      <header class="header">
        <img class="header__logo" src="./images/logo.svg" alt="Spots logo" />
      </header>

      <!-- MAIN CONTENT -->
      <main class="main">
        <section class="profile page__section">
          <img
            class="profile__avatar"
            src="./images/avatar.jpg"
            alt="Jacques Cousteau avatar"
          />
          <div class="profile__info">
            <h1 class="profile__name">Jacques Cousteau</h1>
            <p class="profile__description">Explorer</p>
            <button class="profile__edit-button" type="button">
              <img
                class="profile__edit-default-icon"
                src="./images/edit-profile-default.png"
                alt="Editing your profile image"
              />
            </button>
          </div>
          <button class="profile__add-button" type="button">New Post</button>
        </section>

        <!-- CARDS CONTENT -->
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <img class="card__image" />
                <div class="card__content">
                  <h2 class="card__title"></h2>
                  <button class="card__like-button" type="button"></button>
                  <button class="card__delete-button" type="button"></button>
                </div>
              </li>

      </main>

      <!-- FOOTER MAIN -->
      <footer class="footer page__section">
        <p class="footer__copyright">2026 © Spots</p>

    <!-- MODALS -->

    <!-- EDIT MODAL -->
    <div class="modal" id="edit-profile-modal">
      <div class="modal__container">
        <button type="button" class="modal__close"></button>
        <h2 class="modal__title">Edit profile</h2>
        <form class="modal__form" novalidate>
          <label for="profile-name" class="modal__label">
            Name
            <input
              id="profile-name"
              type="text"
              class="modal__input"
              placeholder="Name"
              maxlength="40"
              minlength="2"
              required
            />
            <span id="profile-name-error" class="modal__error"></span>
          </label>
          <label for="profile-description" class="modal__label"
            >Description
            <input
              id="profile-description"
              type="text"
              class="modal__input"
              placeholder="Description"
              maxlength="200"
              minlength="2"
              required
            />
            <span id="profile-description-error" class="modal__error"></span>
          </label>
          <button type="submit" class="modal__save">Save</button>
        </form>
      </div>
    </div>
    <!-- NEW POST MODAL -->
    <div class="modal" id="new-post-modal">
      <div class="modal__container">
        <button class="modal__close" type="button"></button>
        <h2 class="modal__title">New post</h2>
        <form class="modal__form" novalidate>
          <label for="image-link" class="modal__label"
            >Image Link
            <input
              id="image-link"
              type="url"
              class="modal__input"
              placeholder="Image url"
              required
            />
            <span id="image-link-error" class="modal__error"></span>
          </label>
          <label for="post-caption" class="modal__label"
            >Caption
            <input
              id="post-caption"
              type="text"
              class="modal__input"
              placeholder="Caption"
              minlength="2"
              maxlength="30"
              required
            />
            <span id="post-caption-error" class="modal__error"></span>
          </label>
          <button type="submit" class="modal__save">Save</button>
        </form>
      </div>
    </div>
    <!-- PREVIEW MODAL -->
    <div class="modal" id="preview-modal">
      <div class="modal__container modal__container_type_preview">
        <button class="modal__close" type="button"></button>
        <img class="modal__image" alt="Preview image" />
        <p class="modal__caption"></p>
      </div>
    </div>
    <script defer src="./scripts/index.js"></script>
    <script defer src="./scripts/validation.js"></script>
