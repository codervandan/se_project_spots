<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="Spots is a social media app where users share and like photos."/><meta name="author" content="Daniel Quintana"/><meta name="keywords" content="photos, social media, sharing"/><link rel="icon" href="./favicon.ico"/><title>Spots</title><link rel="icon" href="favicon.ico"><script defer="defer" src="main.js"></script><link href="main.css" rel="stylesheet"></head><body><div class="page"><header class="header"><img class="header__logo" src="31ae2bed78263b59264e.svg" alt="Logo"/></header><main class="main"><section class="profile page__section"><img class="profile__avatar" src="2fc47fd8e9a9bcd9612f.jpg" alt="Jacques Cousteau avatar"/><div class="profile__info"><h1 class="profile__name">D</h1><p class="profile__description">Dev</p><button class="profile__edit-button" type="button"><img class="profile__edit-default-icon" src="d256880638e58bd23000.png" alt="Editing your profile image"/></button></div><button class="profile__add-button" type="button">New Post</button></section><section class="cards page__section"><ul class="cards__list"><template id="card-template"><li class="card"><img class="card__image"/><div class="card__content"><h2 class="card__title"></h2><button class="card__like-button" type="button"></button> <button class="card__delete-button" type="button"></button></div></li></template></ul></section></main><footer class="footer page__section"><p class="footer__copyright">2026 © Spots</p></footer></div><div class="modal" id="edit-profile-modal"><div class="modal__container"><button type="button" class="modal__close"></button><h2 class="modal__title">Edit profile</h2><form class="modal__form" novalidate><label for="profile-name" class="modal__label">Name <input id="profile-name" class="modal__input" placeholder="Name" maxlength="40" minlength="2" required/> <span id="profile-name-error" class="modal__error"></span></label> <label for="profile-description" class="modal__label">Description <input id="profile-description" class="modal__input" placeholder="Description" maxlength="200" minlength="2" required/> <span id="profile-description-error" class="modal__error"></span></label> <button type="submit" class="modal__save">Save</button></form></div></div><div class="modal" id="new-post-modal"><div class="modal__container"><button class="modal__close" type="button"></button><h2 class="modal__title">New post</h2><form class="modal__form" novalidate><label for="image-link" class="modal__label">Image Link <input id="image-link" type="url" class="modal__input" placeholder="Image url" required/> <span id="image-link-error" class="modal__error"></span></label> <label for="post-caption" class="modal__label">Caption <input id="post-caption" class="modal__input" placeholder="Caption" minlength="2" maxlength="30" required/> <span id="post-caption-error" class="modal__error"></span></label> <button type="submit" class="modal__save">Save</button></form></div></div><div class="modal" id="preview-modal"><div class="modal__container modal__container_type_preview"><button class="modal__close" type="button"></button> <img class="modal__image" alt="Preview image"/><p class="modal__caption"></p></div></div></body></html>
